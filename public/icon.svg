<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: black; }
      .foreground { fill: white; stroke: white; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: white; }
      .foreground { fill: black; stroke: black; }
    }
  </style>
  <rect class="background" width="180" height="180" rx="37" />
  <!-- Scales of Justice (law icon) -->
  <g class="foreground" transform="translate(0,0)">
    <!-- pole -->
    <path d="M90 40v85" stroke-width="10" stroke-linecap="round" />
    <!-- top beam -->
    <path d="M55 65h70" stroke-width="10" stroke-linecap="round" />
    <!-- left hanger -->
    <path d="M70 65v15" stroke-width="6" stroke-linecap="round" />
    <!-- right hanger -->
    <path d="M110 65v15" stroke-width="6" stroke-linecap="round" />
    <!-- left scale -->
    <path d="M52 82c3 10 10 16 18 16s15-6 18-16H52z" fill="currentColor" stroke="none" />
    <!-- right scale -->
    <path d="M92 82c3 10 10 16 18 16s15-6 18-16H92z" fill="currentColor" stroke="none" />
    <!-- base -->
    <path d="M62 140h56" stroke-width="12" stroke-linecap="round" />
  </g>
</svg>